require conf/distro/poky.conf

DISTRO = "beaglebone-distro"
DISTRO_NAME = "BeagleBone Black Distribution"
DISTRO_VERSION = "1.0"

# Enable systemd and required features
DISTRO_FEATURES:append = " systemd usrmerge"
DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

# Use systemd as init system
VIRTUAL-RUNTIME_init_manager = "systemd"
# VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# Enable Rust in this specific version
DISTRO_FEATURES:append = " rust"
RUST_VERSION = "1.85.1"
CARGO_VERSION = "1.85.1"


IMAGE_BOOT_FILES += "devicetree/*.dtbo;overlays/"
IMAGE_BOOT_FILES += "extlinux/extlinux.conf;extlinux/"
